<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>서울시 정비사업 현황</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        #map { width: 100%; height: calc(100vh - 50px); }
        .controls {
            height: 50px;
            background: #333;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            overflow-x: auto;
        }
        .controls select, .controls button {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .controls select { background: #fff; }
        .controls label { color: #fff; font-size: 12px; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
        .controls span { color: #fff; font-size: 13px; margin-left: auto; }
        .switch-container {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #444;
            padding: 4px 10px;
            border-radius: 15px;
        }
        .switch { position: relative; width: 36px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .3s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #4CAF50; }
        input:checked + .slider:before { transform: translateX(16px); }
        .legend {
            position: absolute; bottom: 30px; right: 10px;
            background: rgba(255,255,255,0.95); padding: 12px;
            border-radius: 6px; font-size: 11px; z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            max-height: 450px; overflow-y: auto;
        }
        .legend-item { display: flex; align-items: center; margin: 4px 0; }
        .legend-color { width: 16px; height: 12px; margin-right: 6px; border: 1px solid #333; }
        .leaflet-popup-content { font-size: 12px; line-height: 1.5; min-width: 250px; }
        .leaflet-popup-content strong { font-size: 14px; }
        .stage-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; color: white; margin: 3px 2px; }
        .info-box {
            position: absolute; top: 60px; left: 10px;
            background: rgba(255,255,255,0.95); padding: 10px 15px;
            border-radius: 6px; font-size: 12px; z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .popup-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        .popup-table td { padding: 3px 5px; border-bottom: 1px solid #eee; }
        .popup-table td:first-child { color: #666; width: 70px; }
        .popup-table td:last-child { font-weight: 500; }
        .match-badge { display: inline-block; padding: 2px 6px; border-radius: 8px; font-size: 10px; font-weight: bold; color: white; margin: 2px; }
        .polygon-label {
            background: rgba(255,255,255,0.85) !important;
            border: 1px solid #999 !important;
            border-radius: 3px !important;
            padding: 2px 5px !important;
            font-size: 10px;
            font-weight: bold;
            color: #333;
            white-space: nowrap;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .polygon-label::before { display: none !important; }
        .label-3080 { color: #D32F2F !important; background: rgba(255,235,235,0.95) !important; border-color: #D32F2F !important; font-size: 11px; }
        .label-sintong { color: #00838F !important; background: rgba(224,247,250,0.95) !important; border-color: #00BCD4 !important; }
        .label-moatown { color: #558B2F !important; background: rgba(241,248,233,0.95) !important; border-color: #8BC34A !important; }
        .label-jungbi { color: #333 !important; font-size: 9px; }
    </style>
</head>
<body>
    <div class="controls">
        <select id="stageFilter" onchange="applyFilters()">
            <option value="">전체 단계</option>
            <option value="관리처분인가">관리처분인가</option>
            <option value="사업시행인가">사업시행인가</option>
            <option value="조합설립인가">조합설립인가</option>
            <option value="추진위원회승인">추진위원회승인</option>
            <option value="정비구역지정">정비구역지정</option>
        </select>
        <select id="typeFilter" onchange="applyFilters()">
            <option value="">전체 유형</option>
            <option value="재개발">재개발</option>
            <option value="재건축">재건축</option>
            <option value="3080">3080+도심공공</option>
        </select>
        <label><input type="checkbox" id="showJungbi" onchange="applyFilters()" checked> 정비구역</label>
        <label><input type="checkbox" id="showDosim" onchange="toggleDosim()" checked> 3080+</label>
        <label><input type="checkbox" id="showSintong" onchange="toggleSintong()" checked> 신통기획</label>
        <label><input type="checkbox" id="showMoatown" onchange="toggleMoatown()" checked> 모아타운</label>
        <label><input type="checkbox" id="showMaemul" onchange="toggleMaemul()" checked> 매물</label>
        <div class="switch-container">
            <span style="color:#fff;font-size:11px;">구역내만</span>
            <label class="switch">
                <input type="checkbox" id="onlyMatched" onchange="toggleMaemul()">
                <span class="slider"></span>
            </label>
        </div>
        <span id="status">로딩중...</span>
    </div>
    <div id="map"></div>

    <div class="info-box">
        <strong>서울시 정비사업 현황</strong><br>
        정비구역 896 | 3080+ 20 | 신통 83 | 모아 61<br>
        매물 6,630 (정비42 | 3080+159 | 신통48 | 모아72)
    </div>

    <div class="legend">
        <strong>정비구역 진행단계</strong>
        <div class="legend-item"><div class="legend-color" style="background:#2196F3"></div>관리처분인가</div>
        <div class="legend-item"><div class="legend-color" style="background:#9C27B0"></div>사업시행인가</div>
        <div class="legend-item"><div class="legend-color" style="background:#FF9800"></div>조합설립인가</div>
        <div class="legend-item"><div class="legend-color" style="background:#FF5722"></div>추진위원회</div>
        <div class="legend-item"><div class="legend-color" style="background:#795548"></div>정비구역지정</div>
        <hr style="margin:8px 0">
        <strong>특수 사업</strong>
        <div class="legend-item"><div class="legend-color" style="background:#F44336"></div>3080+ 도심공공 (20)</div>
        <div class="legend-item"><div class="legend-color" style="background:#00BCD4"></div>신통기획 (83)</div>
        <div class="legend-item"><div class="legend-color" style="background:#8BC34A"></div>모아타운 (61)</div>
        <hr style="margin:8px 0">
        <strong>매물 (6,630)</strong>
        <div class="legend-item"><div class="legend-color" style="background:#4CAF50; border-radius:50%"></div>정비구역 (42)</div>
        <div class="legend-item"><div class="legend-color" style="background:#F44336; border-radius:50%"></div>3080+ (159)</div>
        <div class="legend-item"><div class="legend-color" style="background:#00BCD4; border-radius:50%"></div>신통기획 (48)</div>
        <div class="legend-item"><div class="legend-color" style="background:#8BC34A; border-radius:50%"></div>모아타운 (72)</div>
        <div class="legend-item"><div class="legend-color" style="background:#E91E63; border-radius:50%"></div>일반</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const stageColors = {
            '관리처분인가': '#2196F3', '사업시행인가': '#9C27B0', '조합설립인가': '#FF9800',
            '추진위원회승인': '#FF5722', '추진위구성': '#FF5722', '정비구역지정': '#795548',
            '정비계획 수립': '#607D8B', '이주중': '#F44336', '보상준비': '#F44336',
            '설계준비': '#F44336', '예정지구지정': '#F44336', '추진중': '#F44336', '-': '#BDBDBD'
        };
        function getColor(stage) { return stageColors[stage] || '#9E9E9E'; }

        const map = L.map('map').setView([37.5665, 126.9780], 11);
        map.createPane('maemulPane');
        map.getPane('maemulPane').style.zIndex = 650;

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let geojsonLayer = null, geojsonData = null;
        let dosimLayer = null, dosimData = null;
        let sintongLayer = null, sintongData = null;
        let moatownLayer = null, moatownData = null;
        let maemulLayer = null, maemulData = null;

        fetch('jungbi_active.geojson').then(res => res.json()).then(data => {
            geojsonData = data;
            applyFilters();
            updateStatus();
        });
        fetch('dosim3080_polygon.geojson').then(res => res.json()).then(data => {
            dosimData = data;
            toggleDosim();
        });
        fetch('sintong_polygon.geojson').then(res => res.json()).then(data => {
            sintongData = data;
            toggleSintong();
        });
        fetch('moatown_polygon.geojson').then(res => res.json()).then(data => {
            moatownData = data;
            toggleMoatown();
        });
        fetch('maemul.geojson').then(res => res.json()).then(data => {
            maemulData = data;
            toggleMaemul();
        });

        function updateStatus() {
            const jc = geojsonLayer ? geojsonLayer.getLayers().length : 0;
            const mc = maemulLayer ? maemulLayer.getLayers().length : 0;
            document.getElementById('status').textContent = `정비: ${jc} | 매물: ${mc}`;
        }

        function applyFilters() {
            const stageFilter = document.getElementById('stageFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;
            const showJungbi = document.getElementById('showJungbi').checked;

            if (geojsonLayer) map.removeLayer(geojsonLayer);
            if (!showJungbi || !geojsonData) return;

            geojsonLayer = L.geoJSON(geojsonData, {
                filter: feature => {
                    const p = feature.properties;
                    const stage = p['진행단계'] || '-';
                    const name = p['DGM_NM'] || '';
                    const type = p['구역유형'] || '';
                    const is3080 = type.includes('도심공공') || name.includes('3080');

                    if (is3080) return false; // 3080+는 별도 레이어
                    if (stageFilter && stage !== stageFilter) return false;
                    if (typeFilter === '재개발' && !type.includes('재개발') && !name.includes('재개발')) return false;
                    if (typeFilter === '재건축' && !type.includes('재건축') && !name.includes('재건축')) return false;
                    return true;
                },
                style: feature => {
                    const stage = feature.properties['진행단계'] || '-';
                    const color = getColor(stage);
                    return { color, weight: 2, opacity: 0.9, fillColor: color, fillOpacity: 0.35 };
                },
                onEachFeature: (feature, layer) => {
                    const p = feature.properties;
                    const stage = p['진행단계'] || '-';
                    const color = getColor(stage);
                    const area = p.SHAPE_AREA ? (p.SHAPE_AREA / 10000).toFixed(1) + ' 만㎡' : '-';
                    layer.bindPopup(`
                        <strong>${p.DGM_NM || '-'}</strong><br>
                        <span class="stage-badge" style="background:${color}">${stage}</span><br><br>
                        <b>구역유형:</b> ${p['구역유형'] || '-'}<br>
                        <b>면적:</b> ${area}
                    `);
                    // 상시 레이블
                    const name = p.DGM_NM || '';
                    if (name && name.length < 25) {
                        layer.bindTooltip(name, {
                            permanent: true,
                            direction: 'center',
                            className: 'polygon-label label-jungbi'
                        });
                    }
                    layer.on('mouseover', () => layer.setStyle({ fillOpacity: 0.6 }));
                    layer.on('mouseout', () => layer.setStyle({ fillOpacity: 0.35 }));
                }
            }).addTo(map);
            updateStatus();
        }

        function toggleDosim() {
            if (dosimLayer) map.removeLayer(dosimLayer);
            if (!document.getElementById('showDosim').checked || !dosimData) return;

            dosimLayer = L.geoJSON(dosimData, {
                style: { color: '#F44336', weight: 3, opacity: 0.9, fillColor: '#F44336', fillOpacity: 0.35 },
                onEachFeature: (feature, layer) => {
                    const p = feature.properties;
                    layer.bindPopup(`
                        <strong style="color:#F44336">${p['DGM_NM']}</strong><br>
                        <span class="stage-badge" style="background:#F44336">${p['진행단계']}</span><br><br>
                        <b>자치구:</b> ${p['자치구']}<br>
                        <b>위치:</b> ${p['위치']}<br>
                        <b>면적:</b> ${(p['면적']/10000).toFixed(2)} 만㎡<br>
                        <b>세대수:</b> ${p['세대수'].toLocaleString()}세대
                    `);
                    // 상시 레이블
                    layer.bindTooltip(p['DGM_NM'], {
                        permanent: true,
                        direction: 'center',
                        className: 'polygon-label label-3080'
                    });
                    layer.on('mouseover', () => layer.setStyle({ fillOpacity: 0.6 }));
                    layer.on('mouseout', () => layer.setStyle({ fillOpacity: 0.35 }));
                }
            }).addTo(map);
        }

        function toggleSintong() {
            if (sintongLayer) map.removeLayer(sintongLayer);
            if (!document.getElementById('showSintong').checked || !sintongData) return;

            sintongLayer = L.geoJSON(sintongData, {
                style: { color: '#00BCD4', weight: 2, opacity: 0.8, fillColor: '#00BCD4', fillOpacity: 0.25, dashArray: '5,5' },
                onEachFeature: (feature, layer) => {
                    const p = feature.properties;
                    layer.bindPopup(`
                        <strong>신통기획: ${p['구역명']}</strong><br>
                        <span class="stage-badge" style="background:#00BCD4">${p['추진단계']}</span><br><br>
                        <b>자치구:</b> ${p['자치구']}<br>
                        <b>면적:</b> ${p['면적']}<br>
                        <b>세대수:</b> ${p['세대수']}
                    `);
                    // 상시 레이블
                    layer.bindTooltip(p['구역명'], {
                        permanent: true,
                        direction: 'center',
                        className: 'polygon-label label-sintong'
                    });
                    layer.on('mouseover', () => layer.setStyle({ fillOpacity: 0.5 }));
                    layer.on('mouseout', () => layer.setStyle({ fillOpacity: 0.25 }));
                }
            }).addTo(map);
        }

        function toggleMoatown() {
            if (moatownLayer) map.removeLayer(moatownLayer);
            if (!document.getElementById('showMoatown').checked || !moatownData) return;

            moatownLayer = L.geoJSON(moatownData, {
                style: { color: '#8BC34A', weight: 2, opacity: 0.8, fillColor: '#8BC34A', fillOpacity: 0.25, dashArray: '3,3' },
                onEachFeature: (feature, layer) => {
                    const p = feature.properties;
                    layer.bindPopup(`
                        <strong>모아타운: ${p['위치']}</strong><br>
                        <span class="stage-badge" style="background:#8BC34A">${p['현황']}</span><br><br>
                        <b>자치구:</b> ${p['자치구']}<br>
                        <b>면적:</b> ${p['면적']}<br>
                        <b>세대수:</b> ${p['세대수']}
                    `);
                    // 상시 레이블
                    layer.bindTooltip(p['위치'], {
                        permanent: true,
                        direction: 'center',
                        className: 'polygon-label label-moatown'
                    });
                    layer.on('mouseover', () => layer.setStyle({ fillOpacity: 0.5 }));
                    layer.on('mouseout', () => layer.setStyle({ fillOpacity: 0.25 }));
                }
            }).addTo(map);
        }

        function toggleMaemul() {
            if (maemulLayer) map.removeLayer(maemulLayer);
            if (!document.getElementById('showMaemul').checked || !maemulData) return;

            const onlyMatched = document.getElementById('onlyMatched').checked;

            maemulLayer = L.geoJSON(maemulData, {
                pane: 'maemulPane',
                filter: feature => {
                    if (!onlyMatched) return true;
                    const p = feature.properties;
                    return p.in_jungbi || p.in_moatown || p.in_sintong || p.in_dosim;
                },
                pointToLayer: (feature, latlng) => {
                    const p = feature.properties;
                    let color = '#E91E63', radius = 6;
                    if (p.in_jungbi) { color = '#4CAF50'; radius = 8; }
                    else if (p.in_dosim) { color = '#F44336'; radius = 8; }
                    else if (p.in_sintong) { color = '#00BCD4'; radius = 7; }
                    else if (p.in_moatown) { color = '#8BC34A'; radius = 7; }
                    return L.circleMarker(latlng, {
                        pane: 'maemulPane', radius, fillColor: color,
                        color: '#fff', weight: 2, opacity: 1, fillOpacity: 0.85
                    });
                },
                onEachFeature: (feature, layer) => {
                    const p = feature.properties;
                    let badges = '';
                    if (p.in_jungbi) badges += '<span class="match-badge" style="background:#4CAF50">정비구역</span>';
                    if (p.in_dosim) badges += '<span class="match-badge" style="background:#F44336">3080+</span>';
                    if (p.in_sintong) badges += '<span class="match-badge" style="background:#00BCD4">신통기획</span>';
                    if (p.in_moatown) badges += '<span class="match-badge" style="background:#8BC34A">모아타운</span>';

                    let matchInfo = '';
                    if (p['정비구역']) matchInfo += `<tr><td>정비구역</td><td>${p['정비구역']}</td></tr>`;
                    if (p['도심공공']) matchInfo += `<tr><td>3080+</td><td>${p['도심공공']}</td></tr>`;
                    if (p['신통구역']) matchInfo += `<tr><td>신통기획</td><td>${p['신통구역']}</td></tr>`;
                    if (p['모아타운']) matchInfo += `<tr><td>모아타운</td><td>${p['모아타운']}</td></tr>`;

                    layer.bindPopup(`
                        <strong>${p['시구']} ${p['동']}</strong><br>
                        <span style="font-size:11px;color:#666">${p['주소'] || ''}</span><br>
                        ${badges}
                        <table class="popup-table">
                            <tr><td>감정가</td><td><b>${p['감정가']}</b> 만원</td></tr>
                            <tr><td>최저가</td><td><b style="color:#E91E63">${p['최저가']}</b> 만원 (${p['비율']})</td></tr>
                            ${p['AI추정가'] ? `<tr><td>AI추정가</td><td><b style="color:#2196F3">${p['AI추정가']}</b> 만원</td></tr>` : ''}
                            <tr><td>전용</td><td>${p['전용면적']}㎡ (${p['전용평수']}평)</td></tr>
                            <tr><td>유찰</td><td>${p['유찰횟수']}회</td></tr>
                            <tr><td>매각기일</td><td>${p['매각기일']}</td></tr>
                            <tr><td>이용상태</td><td>${p['이용상태']}</td></tr>
                            ${p['공시가격'] ? `<tr><td>공시가격</td><td>${p['공시가격']} 만원</td></tr>` : ''}
                            ${p['최근실거래가'] ? `<tr><td>실거래</td><td>${p['최근실거래가']} 만원</td></tr>` : ''}
                            ${matchInfo}
                        </table>
                    `);
                }
            }).addTo(map);
            updateStatus();
        }
    </script>
</body>
</html>
